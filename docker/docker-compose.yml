version: "3.9"

services:

  app:
    build: ../app
    container_name: app
    restart: always
    env_file:
      - ../.env

    networks:
      - devops-net

    volumes:
    - ../logs/app:/var/log/app

  nginx:
    build: ../nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always
    networks:
      - devops-net
  
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - devops-net
  
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge


