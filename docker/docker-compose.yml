version: "3.9"

services:

  app:
    build: ../app
    container_name: app
    restart: always
    env_file:
      - ../.env

    networks:
      - devops-net

  nginx:
    build: ../nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge
